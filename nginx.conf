# ==================== nginx.conf ====================
# Nginx configuration for Entertainment Tadka Bot

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main buffer=32k;
    error_log /var/log/nginx/error.log warn;
    
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/xhtml+xml 
               image/svg+xml image/x-icon;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=bot_limit:10m rate=30r/m;
    
    # Upstream to PHP-FPM
    upstream php {
        server bot:9000;
    }
    
    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        
        # Redirect to HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name your-domain.com;  # Replace with your domain
        
        # SSL certificates
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        
        # Root directory
        root /var/www/html;
        index New-MNA-Bot.php index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
        
        # Bot endpoint
        location /bot {
            limit_req zone=bot_limit burst=10 nodelay;
            try_files $uri $uri/ /New-MNA-Bot.php?$query_string;
        }
        
        location = /setup {
            try_files $uri /New-MNA-Bot.php?setup=1;
        }
        
        location = /test {
            try_files $uri /New-MNA-Bot.php?test=1;
        }
        
        location = /deletehook {
            try_files $uri /New-MNA-Bot.php?deletehook=1;
        }
        
        # PHP handling
        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_index New-MNA-Bot.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include fastcgi_params;
            
            # Increase timeouts for bot
            fastcgi_read_timeout 300;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
        }
        
        # Static files
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # Deny access to sensitive files
        location ~ /\. {
            deny all;
        }
        
        location ~* \.(json|csv|log|env|bak)$ {
            deny all;
            return 404;
        }
        
        location ~ /(cache|backups|logs) {
            deny all;
            return 404;
        }
        
        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}