# ==================== render.yaml (FIXED) ====================

services:
  - type: web
    name: entertainment-tadka-bot
    runtime: docker
    repo: https://github.com/yourusername/entertainment-bot
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    
    # 🔥 CRITICAL FIX - Explicit port binding
    ports:
      - port: 80
        protocol: HTTP
      - port: 443
        protocol: HTTPS
    
    # 🔥 Health check with proper endpoint
    healthCheckPath: /New-MNA-Bot.php?test
    healthCheckTimeout: 10
    
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        value: EntertainmentTadkaBot
      - key: BOT_ID
        value: 8315381064
      - key: ADMIN_IDS
        value: 1080317415
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: PUBLIC_CHANNEL_1_ID
        value: -1003181705395
      - key: PUBLIC_CHANNEL_1_USERNAME
        value: "@EntertainmentTadka786"
      - key: PUBLIC_CHANNEL_2_ID
        value: -1003614546520
      - key: PUBLIC_CHANNEL_2_USERNAME
        value: "@Entertainment_Tadka_Serial_786"
      - key: PUBLIC_CHANNEL_3_ID
        value: -1002831605258
      - key: PUBLIC_CHANNEL_3_USERNAME
        value: "@threater_print_movies"
      - key: PUBLIC_CHANNEL_4_ID
        value: -1002964109368
      - key: PUBLIC_CHANNEL_4_USERNAME
        value: "@ETBackup"
      - key: PRIVATE_CHANNEL_1_ID
        value: -1003251791991
      - key: PRIVATE_CHANNEL_2_ID
        value: -1002337293281
      - key: REQUEST_GROUP_ID
        value: -1003083386043
      - key: REQUEST_GROUP_USERNAME
        value: "@EntertainmentTadka7860"
    
    # 🔥 Disk mount for persistence
    disk:
      name: bot-data
      mountPath: /var/www/html
      sizeGB: 5
