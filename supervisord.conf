; ==================== supervisord.conf ====================
; Supervisor configuration for Docker
; Updated for Render.com

[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root

[program:apache2]
command=/bin/bash -c "source /etc/apache2/envvars && /usr/sbin/apache2 -DFOREGROUND"
autostart=true
autorestart=true
startretries=5
startsecs=3
stderr_logfile=/var/log/supervisor/apache2.err.log
stdout_logfile=/var/log/supervisor/apache2.out.log
user=root

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/cron.err.log
stdout_logfile=/var/log/supervisor/cron.out.log

; 🔥 SIMPLE HEALTHCHECK - Just logs, no external dependencies
[program:healthcheck]
command=/bin/bash -c "while true; do echo '[$(date)] Health check OK - Apache running' >> /var/log/health.log; sleep 60; done"
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/health.err.log
stdout_logfile=/var/log/supervisor/health.out.log

[group:bot]
programs=apache2,cron,healthcheck
priority=999
