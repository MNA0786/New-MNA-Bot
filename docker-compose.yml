version: '3.8'

services:
  bot:
    build: .
    container_name: entertainment-tadka-bot
    ports:
      - "8080:80"
    environment:
      # Environment
      - ENVIRONMENT=development
      - MAINTENANCE_MODE=false
      
      # Bot Configuration
      - BOT_TOKEN=${BOT_TOKEN}
      - BOT_USERNAME=@EntertainmentTadkaBot
      - BOT_ID=8315381064
      
      # Admin
      - ADMIN_IDS=1080317415
      
      # API Credentials
      - API_ID=21944581
      - API_HASH=7b1c174a5cd3466e25a976c39a791737
      
      # Public Channels
      - PUBLIC_CHANNEL_1_ID=-1003181705395
      - PUBLIC_CHANNEL_1_USERNAME=@EntertainmentTadka786
      - PUBLIC_CHANNEL_2_ID=-1003614546520
      - PUBLIC_CHANNEL_2_USERNAME=@Entertainment_Tadka_Serial_786
      - PUBLIC_CHANNEL_3_ID=-1002831605258
      - PUBLIC_CHANNEL_3_USERNAME=@threater_print_movies
      - PUBLIC_CHANNEL_4_ID=-1002964109368
      - PUBLIC_CHANNEL_4_USERNAME=@ETBackup
      
      # Private Channels
      - PRIVATE_CHANNEL_1_ID=-1003251791991
      - PRIVATE_CHANNEL_1_USERNAME=Private Channel 1
      - PRIVATE_CHANNEL_2_ID=-1002337293281
      - PRIVATE_CHANNEL_2_USERNAME=Private Channel 2
      
      # Request Group
      - REQUEST_GROUP_ID=-1003083386043
      - REQUEST_GROUP_USERNAME=@EntertainmentTadka7860
      
      # Request System
      - REQUEST_SYSTEM_ENABLED=true
      - MAX_REQUESTS_PER_DAY=3
      
      # Webhook
      - WEBHOOK_URL=http://localhost:8080
      
    volumes:
      # Persistent data
      - ./data:/var/www/html/data
      - ./backups:/var/www/html/backups
      - ./cache:/var/www/html/cache
      - ./logs:/var/www/html/logs
      - ./tmp:/var/www/html/tmp
      
      # Configuration files
      - ./users.json:/var/www/html/users.json
      - ./movies.csv:/var/www/html/movies.csv
      - ./requests.json:/var/www/html/requests.json
      - ./bot_stats.json:/var/www/html/bot_stats.json
      - ./error.log:/var/www/html/error.log
      
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  bot-network:
    driver: bridge